repos:
  # Ruff — lint (with auto-fix) + format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]   # auto-fix safe violations before failing
      - id: ruff-format

  # Mypy — static type checking
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: ["orcha/"]
        pass_filenames: false  # always check the whole package, not individual files
